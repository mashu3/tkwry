name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.9"

      - name: Ruff check
        run: ruff check tkwry tests examples

      - name: Ruff format
        run: ruff format --check tkwry tests examples

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Python build dependencies
        run: pip install "maturin>=1.0" "mypy>=1.13"

      - name: Build and install package
        env:
          PKG_CONFIG_PATH: ""
        run: |
          maturin build --profile ci --out dist
          pip install dist/*.whl
          cd /tmp
          python -c "import tkwry._core"

      - name: Stubtest
        run: |
          cd /tmp
          python -m mypy.stubtest \
            --mypy-config-file "$GITHUB_WORKSPACE/pyproject.toml" \
            tkwry._core tkwry.exceptions tkwry.webview

      - run: cargo fmt --check

      - name: Clippy
        env:
          PKG_CONFIG_PATH: ""
        run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-11-arm
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest

      - name: Build and install
        shell: bash
        env:
          PKG_CONFIG_PATH: ""
        run: |
          maturin build --profile ci --out dist
          pip install dist/*.whl

      - name: Configure Tcl/Tk (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "TCL_LIBRARY=${pythonLocation}/tcl/tcl8.6" >> "$GITHUB_ENV"
          echo "TK_LIBRARY=${pythonLocation}/tcl/tk8.6" >> "$GITHUB_ENV"

      - name: Enlarge /dev/shm for WebKitGTK
        if: runner.os == 'Linux'
        run: sudo mount -o remount,size=2G /dev/shm

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          DISPLAY: :99
          TK_SILENCE_DEPRECATION: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          # WebKitGTK hangs after many WebViews and needs >64MB /dev/shm.
          # Split suites live in scripts/run-linux-ci-tests.sh (Docker --ci uses the same).
          Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
          sleep 3
          bash scripts/run-linux-ci-tests.sh

      - name: Run tests (Windows / macOS)
        if: runner.os != 'Linux'
        shell: bash
        env:
          TK_SILENCE_DEPRECATION: "1"
        run: pytest tests/ -v
